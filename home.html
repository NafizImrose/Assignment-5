<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- daisyUI+tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- css -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-[#F8FAFC]">
    <nav>
      <div class="navbar bg-base-100 shadow-2xl">
        <div class="w-11/12 mx-auto flex">
          <div class="flex-1">
            <a class="flex items-center gap-2">
              <div>
                <img class="w-10 mx-auto" src="assets/github-logo.png" alt="" />
              </div>
              <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            </a>
          </div>

          <div
            class="flex items-center border border-gray-300 rounded px-3 py-2 w-64"
          >
            <i class="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
            <input
              type="text"
              placeholder="Search issues..."
              class="outline-none w-full border-none"
            />
          </div>
          <button class="btn btn-primary ml-4">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </nav>

    <section class="w-9/12 bg-white mx-auto shadow-md mt-16 p-6 flex gap-3">
      <button
        id="all-btn"
        onclick="tabBtn('all', 'all-btn')"
        class="btn w-30 btn-primary btn-soft"
      >
        All
      </button>
      <button
        id="open-btn"
        onclick="tabBtn('open', 'open-btn')"
        class="btn w-30 btn-primary btn-soft"
      >
        Open
      </button>
      <button
        id="close-btn"
        onclick="tabBtn('close', 'close-btn')"
        class="btn w-30 btn-primary btn-soft"
      >
        Closed
      </button>
    </section>

    <section
      class="w-9/12 bg-white mx-auto shadow-md mt-3 p-5 flex justify-between"
    >
      <div class="flex gap-3 justify-start items-cente">
        <div
          class="flex justify-center items-center w-10 h-10 bg-[#ECE4FF] rounded-full"
        >
          <img src="assets/Aperture.png" alt="" />
        </div>
        <div>
          <h4 class="font-bold">
            <span id="all-count">50</span
            ><span class="hidden" id="open-count">50</span>
            <span class="hidden" id="close-count">50</span> Issues
          </h4>
          <p class="text-sm">Track and manage your project issues</p>
        </div>
      </div>
      <div class="mother-dot flex gap-3">
        <div class="flex items-center gap-2">
          <div class="open-curcle bg-[#00A96E] w-3 h-3 rounded-full"></div>
          <h4 class="text-sm">Open</h4>
        </div>
        <div class="flex items-center gap-2">
          <div class="close-curcle bg-[#A855F7] w-3 h-3 rounded-full"></div>
          <h4 class="text-sm">Close</h4>
        </div>
      </div>
    </section>

    <section class="cards w-9/12 mx-auto shadow-md p-6 mt-1 bg-[#F8FAFC]">
      <div id="all" class="grid grid-cols-3 gap-2"></div>
      <div id="open" class="grid grid-cols-3 gap-2"></div>
      <div id="close" class="grid grid-cols-3 gap-2"></div>
    </section>

    <script src="home.js"></script>
  </body>
</html>
