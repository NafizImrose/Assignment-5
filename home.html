<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- daisyUI+tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#F8FAFC]">
    <nav>
      <div class="navbar bg-base-100 shadow-2xl">
        <div class="w-11/12 mx-auto flex">
          <div class="flex-1">
            <a class="flex items-center gap-2">
              <div>
                <img class="w-10 mx-auto" src="assets/github-logo.png" alt="" />
              </div>
              <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            </a>
          </div>

          <div
            class="flex items-center border border-gray-300 rounded px-3 py-2 w-64"
          >
            <i class="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
            <input
              type="text"
              placeholder="Search issues..."
              class="outline-none w-full border-none"
            />
          </div>
          <button class="btn btn-primary ml-4">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </nav>

    <section class="w-9/12 bg-white mx-auto shadow-md mt-16 p-6 flex gap-3">
      <button class="btn w-30 btn-primary btn-soft">All</button>
      <button class="btn w-30 btn-primary btn-soft">Open</button>
      <button class="btn w-30 btn-primary btn-soft">Close</button>
    </section>

    <section
      class="w-9/12 bg-white mx-auto shadow-md mt-3 p-5 flex justify-between"
    >
      <div class="flex gap-3 justify-start items-cente">
        <div
          class="flex justify-center items-center w-10 h-10 bg-[#ECE4FF] rounded-full"
        >
          <img src="assets/Aperture.png" alt="" />
        </div>
        <div>
          <h4 class="font-bold">50 Issues</h4>
          <p class="text-sm">Track and manage your project issues</p>
        </div>
      </div>
      <div class="mother-dot flex gap-3">
        <div class="flex items-center gap-2">
          <div class="open-curcle bg-[#00A96E] w-3 h-3 rounded-full"></div>
          <h4 class="text-sm">Open</h4>
        </div>
        <div class="flex items-center gap-2">
          <div class="close-curcle bg-[#A855F7] w-3 h-3 rounded-full"></div>
          <h4 class="text-sm">Close</h4>
        </div>
      </div>
    </section>

    <section class="cards w-9/12 mx-auto shadow-md p-6 mt-1 bg-[#F8FAFC]">
      <div id="all" class="grid grid-cols-4">
        <div class="card">
          <div class="p-6 bg-white shadow-md border-t-5 border-[#00A96E]">
            <div class="flex justify-between">
              <div><img src="assets/Open-Status.png" alt="" /></div>
              <div class="px-5 py-1 bg-[#FEECEC] rounded-full">
                <h1 class="text-red-500 text-sm">HIGH</h1>
              </div>
            </div>
            <h1 class="font-bold mt-3 mb-2 text-sm">
              Fix navigation menu on mobile devices
            </h1>
            <p class="text-sm pb-3 text-[#64748B]">
              The navigation menu doesn't collapse properly on mobile devices...
            </p>

            <div class="mother-bug flex gap-2">
              <div
                class="px-2 py-1 bg-[#FEECEC] border border-red-600 rounded-full"
              >
                <h1 class="text-red-500 text-sm">
                  <i class="fa-solid fa-bug"></i> BUG
                </h1>
              </div>
            </div>
          </div>
          <div class="w-full border-t border-gray-200"></div>
          <div class="time py-4 px-6 bg-white shadow-md">
            <p class="text-[#64748B]">#1 by john_doe</p>
            <p class="text-[#64748B]">1/15/2024</p>
          </div>
        </div>
      </div>
      <div id="open"></div>
      <div id="close"></div>
    </section>
    <script src="home.js"></script>
  </body>
</html>
