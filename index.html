<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- daisyUI+tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- css -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="max-w-md mx-auto my-16 bg-[#FFFFFF] shadow-2xl">
      <div class="text-center pt-5">
        <div class="flex justify-center">
          <img src="assets/github-logo.png" alt="" />
        </div>
        <h1 class="text-2xl font-bold mt-6 mb-1">GitHub Issues Tracker</h1>
        <p class="text-[#64748B] mb-6">Sign in to manage your issues</p>
      </div>
      <div class="form w-10/12 mx-auto pb-6">
        <fieldset class="fieldset">
          <label class="label font-bold text-black">Username</label>
          <input type="email" class="input w-full" placeholder="Email" />
          <p class="text-[#4A00FF]">Default: admin</p>
          <label class="label font-bold text-black">Password</label>
          <input type="password" class="input w-full" placeholder="Password" />
          <p class="text-[#4A00FF]">Default: admin123</p>

          <button class="btn btn-primary mt-4">Login</button>
        </fieldset>
      </div>

      <div class="or w-10/12 mx-auto flex justify-between items-center pb-6">
        <div class="border-t-1 border-gray-400 flex-1"></div>
        <h1 class="px-2">OR</h1>
        <div class="border-t-1 border-gray-400 flex-1"></div>
      </div>

      <div class="demo w-10/12 mx-auto text-center pb-8">
        <p class="mb-2">Demo Credentials:</p>
        <div class="bg-[#F8FAFC] py-6">
          <h1><span class="font-bold text-black">Username: </span>admin</h1>
          <h1><span class="font-bold text-black">Password:</span> admin123</h1>
        </div>
      </div>
    </section>
  </body>
</html>
